<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Firmware Uploader</title>

  <link rel="stylesheet"
        href="style.css">

</head>

<body>

  <div class="container">

    <div class="card">

      <h1>Firmware Uploader</h1>

      <label>
        Board Select
      </label>

      <select id="boardSelect"></select>

      <label>
        Firmware Category
      </label>

      <select id="categorySelect"></select>

      <label>
        Firmware
      </label>

      <select id="firmwareSelect"></select>

      <button id="connectBtn">
        Connect
      </button>

      <button id="flashBtn">
        Upload Firmware
      </button>

      <div class="progressBox">

        <div id="progressBar"></div>

      </div>

      <pre id="log"></pre>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
