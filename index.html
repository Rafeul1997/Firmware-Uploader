<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Firmware Uploader</title>

  <link rel="stylesheet"
        href="style.css">

</head>

<body>

  <!-- HEADER -->

  <header>

    <h1>
      Firmware Uploader
    </h1>

  </header>

  <!-- MAIN -->

  <div class="mainContainer">

    <!-- LEFT SIDE -->

    <div class="leftPanel">

      <div class="section">

        <label>
          Board Select
        </label>

        <select id="boardSelect"></select>

      </div>

      <div class="section">

        <label>
          Firmware Category
        </label>

        <select id="categorySelect"></select>

      </div>

      <div class="section">

        <label>
          Firmware
        </label>

        <select id="firmwareSelect"></select>

      </div>

      <button id="connectBtn">

        Connect Board

      </button>

    </div>

    <!-- RIGHT SIDE -->

    <div class="rightPanel">

      <button id="flashBtn">

        Upload Firmware

      </button>

      <div class="progressSection">

        <div class="progressHeader">

          <span>
            Upload Progress
          </span>

          <span id="progressText">
            0%
          </span>

        </div>

        <div class="progressBox">

          <div id="progressBar"></div>

        </div>

      </div>

      <pre id="log"></pre>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
