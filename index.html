<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Firmware Uploader</title>

  <link rel="stylesheet"
        href="style.css">

</head>

<body>

  <div class="mainLayout">

    <!-- LEFT PANEL -->

    <div class="leftPanel">

      <div>

        <h1>
          Firmware Uploader
        </h1>

        <button id="connectBtn">
          Connect
        </button>

      </div>

      <div class="statusText">

        Browser Serial API Ready

      </div>

    </div>

    <!-- RIGHT PANEL -->

    <div class="rightPanel">

      <div class="card">

        <div class="topGrid">

          <div>

            <label>
              Board Select
            </label>

            <select id="boardSelect"></select>

          </div>

          <div>

            <label>
              Firmware Category
            </label>

            <select id="categorySelect"></select>

          </div>

          <div>

            <label>
              Firmware
            </label>

            <select id="firmwareSelect"></select>

          </div>

        </div>

        <button id="flashBtn">

          Upload Firmware

        </button>

        <div class="progressSection">

          <div class="progressHeader">

            <span>
              Upload Progress
            </span>

            <span id="progressText">
              0%
            </span>

          </div>

          <div class="progressBox">

            <div id="progressBar"></div>

          </div>

        </div>

        <pre id="log"></pre>

      </div>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
